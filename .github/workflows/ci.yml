name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Validate YAML frontmatter in all templates
        run: |
          python3 -c "
          import yaml, sys, pathlib

          SKIP_FILES = {'README.md'}

          errors = []
          for md in sorted(pathlib.Path('templates').rglob('*.md')):
              if md.name in SKIP_FILES:
                  continue
              text = md.read_text(encoding='utf-8')
              if not text.startswith('---'):
                  errors.append(f'{md}: missing YAML frontmatter delimiter')
                  continue
              parts = text.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{md}: malformed frontmatter (no closing ---)')
                  continue
              try:
                  data = yaml.safe_load(parts[1])
                  if not isinstance(data, dict):
                      errors.append(f'{md}: frontmatter is not a YAML mapping')
              except yaml.YAMLError as e:
                  errors.append(f'{md}: YAML parse error: {e}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          else:
              print(f'All templates valid.')
          "

  validate-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Validate YAML frontmatter in all rules
        run: |
          python3 -c "
          import yaml, sys, pathlib

          SKIP_FILES = {'README.md', 'RULES_INDEX.md'}

          errors = []
          for md in sorted(pathlib.Path('rules').rglob('*.md')):
              if md.name in SKIP_FILES:
                  continue
              text = md.read_text(encoding='utf-8')
              if not text.startswith('---'):
                  errors.append(f'{md}: missing YAML frontmatter delimiter')
                  continue
              parts = text.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{md}: malformed frontmatter (no closing ---)')
                  continue
              try:
                  yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                  errors.append(f'{md}: YAML parse error: {e}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          else:
              print(f'All rules valid.')
          "

  validate-schemas-and-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "jsonschema>=4.17" "referencing>=0.30" pyyaml
      - name: Run scripts/validate.py (schema shape + instance validation + semver compat)
        # --allow-missing-compat grandfathers existing assets that pre-date the
        # compat.min_core_version requirement (see SBAI-4649). New assets MUST
        # declare compat.min_core_version. Remove this flag once SBAI-4649 lands.
        run: |
          python3 scripts/validate.py --allow-missing-compat
