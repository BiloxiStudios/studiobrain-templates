name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Validate YAML frontmatter in all templates
        run: |
          python3 -c "
          import yaml, sys, pathlib

          errors = []
          for md in sorted(pathlib.Path('_Templates').rglob('*.md')):
              text = md.read_text(encoding='utf-8')
              if not text.startswith('---'):
                  errors.append(f'{md}: missing YAML frontmatter delimiter')
                  continue
              parts = text.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{md}: malformed frontmatter (no closing ---)')
                  continue
              try:
                  data = yaml.safe_load(parts[1])
                  if not isinstance(data, dict):
                      errors.append(f'{md}: frontmatter is not a YAML mapping')
              except yaml.YAMLError as e:
                  errors.append(f'{md}: YAML parse error: {e}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          else:
              print(f'All templates valid.')
          "

  validate-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Validate YAML frontmatter in all rules
        run: |
          python3 -c "
          import yaml, sys, pathlib

          errors = []
          for md in sorted(pathlib.Path('_Rules').rglob('*.md')):
              text = md.read_text(encoding='utf-8')
              if not text.startswith('---'):
                  errors.append(f'{md}: missing YAML frontmatter delimiter')
                  continue
              parts = text.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{md}: malformed frontmatter (no closing ---)')
                  continue
              try:
                  yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                  errors.append(f'{md}: YAML parse error: {e}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          else:
              print(f'All rules valid.')
          "
